name: voip_p2p
description: P2P VoIP calling app with single-ID connection
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.0.0
  socket_io_client: ^3.0.0
  flutter_webrtc: ^0.12.0
  # flutter_callkeep: (add when ready for native call UI)
  firebase_messaging: ^15.0.0
  firebase_core: ^3.0.0
  shared_preferences: ^2.3.0
  http: ^1.2.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
