name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  EXPO_PUBLIC_SOCKET_URL: https://voip-p2p-signaling.onrender.com
  EXPO_PUBLIC_API_KEY: vp2p_90949ffff155d044f5e43222949bee57

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci
        working-directory: mobile

      - name: Build APK
        run: npx expo run:android --no-bundler
        working-directory: mobile
        env:
          EXPO_NO_DOCTOR: 1

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            VoipP2P-$(git describe --tags --always 2>/dev/null || echo "latest").apk
        working-directory: mobile

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: voip-p2p-apk
          path: mobile/*.apk
          retention-days: 30

      - name: Attach APK to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/*.apk
          generate_release_notes: true
