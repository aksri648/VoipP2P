name: Build Android APK

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip release]')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Install required Android SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install npm dependencies
        run: |
          cd mobile
          npm install

      - name: Print ANDROID_HOME
        run: echo "ANDROID_HOME=$ANDROID_HOME"

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > mobile/android/local.properties

      - name: Make gradlew executable
        run: chmod +x mobile/android/gradlew

      - name: Verify Gradle wrapper
        run: |
          if [ ! -f mobile/android/gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Gradle wrapper missing. Commit gradle-wrapper.jar to the repo."
            exit 1
          fi

      - name: Build debug APK
        run: |
          cd mobile/android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: VoipP2P Release v1.0.${{ github.run_number }}
          draft: true
          files: |
            mobile/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
