name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SOCKET_URL: https://voip-p2p-signaling.onrender.com
  API_KEY: vp2p_90949ffff155d044f5e43222949bee57

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29'
          channel: 'stable'
          cache: true

      - name: Generate android/ in temp dir
        run: |
          cd /tmp
          flutter create --project-name voip_p2p --org com.voipp2p --platforms android temp_voip
          cp -r /tmp/temp_voip/android ${{ github.workspace }}/mobile/
          cp /tmp/temp_voip/.gitignore ${{ github.workspace }}/mobile/ 2>/dev/null || true
          rm -rf /tmp/temp_voip

      - name: Install dependencies
        run: flutter pub get
        working-directory: mobile

      - name: Build debug APK
        run: flutter build apk --debug
        working-directory: mobile

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-debug.apk \
            VoipP2P-$(git describe --tags --always 2>/dev/null || echo "latest").apk
        working-directory: mobile

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: voip-p2p-apk
          path: mobile/*.apk
          retention-days: 30

      - name: Attach APK to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/*.apk
          generate_release_notes: true
