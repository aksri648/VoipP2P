name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Android SDK
        uses: android-actions/setup-android-sdk@v2
        with:
          api-levels: "34"
          build-tools: "34.0.0"
          platform-tools: "34.0.0"

      - name: Install npm dependencies
        run: |
          cd mobile
          npm install

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > mobile/android/local.properties

      - name: Build debug APK
        run: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VoipP2P-debug.apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk